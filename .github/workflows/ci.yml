name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ lcov gcovr
    
    - name: Create test program
      run: |
        cat > math.cpp << 'EOF'
        int add(int a, int b) {
            return a + b;
        }
        
        int multiply(int a, int b) {
            return a * b;
        }
        EOF
        
        cat > main.cpp << 'EOF'
        #include <iostream>
        int add(int, int);
        int multiply(int, int);
        
        int main() {
            std::cout << "Add: " << add(5, 3) << std::endl;
            std::cout << "Multiply: " << multiply(5, 3) << std::endl;
            return 0;
        }
        EOF
        
        cat > test_main.cpp << 'EOF'
        #include <cassert>
        int add(int, int);
        int multiply(int, int);
        
        int main() {
            assert(add(2, 2) == 4);
            assert(add(-1, 1) == 0);
            assert(multiply(3, 4) == 12);
            assert(multiply(0, 5) == 0);
            return 0;
        }
        EOF
    
    - name: Compile main program
      run: |
        g++ -fprofile-arcs -ftest-coverage -o main main.cpp math.cpp
    
    - name: Compile tests
      run: |
        g++ -fprofile-arcs -ftest-coverage -o test test_main.cpp math.cpp
    
    - name: Run main program
      run: |
        ./main
    
    - name: Run tests
      run: |
        ./test
    
    - name: List coverage files
      run: |
        ls -la *.gcda *.gcno || echo "No coverage files yet"
    
    - name: Generate coverage info
      run: |
        lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch
    
    - name: Filter coverage
      run: |
        lcov --remove coverage.info 'test_main.cpp' '*/usr/*' --output-file coverage.filtered.info
    
    - name: Show coverage summary
      run: |
        lcov --list coverage.filtered.info
    
    - name: Upload to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: coverage.filtered.info
