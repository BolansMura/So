name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y make g++ qttools5-dev-tools lcov gcovr
    
    - name: Build with coverage flags
      run: |
        qmake -o Makefile "QMAKE_CXXFLAGS += --coverage" "QMAKE_LFLAGS += --coverage"
        make
    
    - name: Run tests (if any)
      run: |
        # Если у вас есть тесты, запустите их здесь
        # Пример для тестового исполняемого файла:
        # ./your_test_executable
        
        # Если тестов нет, создадим простой тест
        ./So || true
        echo "✅ Tests completed"
    
    - name: Generate coverage report
      run: |
        # Собираем информацию о покрытии
        lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch
        lcov --remove coverage.info '/usr/*' --output-file coverage.info
        lcov --list coverage.info
    
    - name: Convert to Coveralls format
      run: |
        gcovr --gcov-executable gcov --root . --xml -o coverage.xml
    
    - name: Upload coverage to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        file: coverage.xml
        # Для приватного репозитория раскомментируйте:
        # github-token: ${{ secrets.GITHUB_TOKEN }}
